<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 200px; padding: 15px; font-family: Arial, sans-serif; }
    h3 { margin-top: 0; font-size: 16px; text-align: center;}
    .toggle-container { display: flex; align-items: center; justify-content: space-between; font-weight: bold;}
    input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }
  </style>
</head>
<body>
  <h3>YT Focus Mode</h3>
  <div class="toggle-container">
    <label for="focusToggle">Block Distractions</label>
    <input type="checkbox" id="focusToggle">
  </div>
  <script src="popup.js"></script>
</body>
</html>
